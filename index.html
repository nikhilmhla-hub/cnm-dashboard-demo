<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNM System Labs - Interactive Demo</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Backdrop for Mobile -->
        <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#FACC15" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M2 17L12 22L22 17" stroke="#FACC15" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M2 12L12 17L22 12" stroke="#FACC15" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>
                <div class="brand-info">
                    <h1 class="brand-name">CNM SYSTEM LABS</h1>
                    <span class="brand-subtitle">Interactive Demo</span>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebar-menu">
                <!-- Sidebar links will be dynamically populated from JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">C</div>
                    <div class="user-details">
                        <span class="username">CNM Admin</span>
                        <span class="role">Presenter Mode</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area">
            <!-- Viewer Container -->
            <div id="viewer-container" class="viewer-container">
                <!-- Empty State Card -->
                <div id="empty-state" class="empty-state-card" style="display: none;">
                    <div class="empty-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>
                    <h3 class="empty-title">Preview Coming Soon</h3>
                    <p class="empty-description">The screenshot page for <strong id="missing-view-name">Rank
                            Snapshot</strong> is ready for integration. Drop the screenshot file into <code
                            class="code-path">assets/images/</code> to preview it.</p>
                </div>

                <!-- Zoom View wrapper -->
                <div id="zoom-wrapper" class="zoom-wrapper">
                    <img id="dashboardImage" class="dashboard-image" alt="CNM Dashboard Preview" />
                </div>

                <!-- Floating Zoom Info Indicator -->
                <div id="zoom-indicator" class="zoom-indicator" style="display: none;">
                    <span id="zoom-value">100%</span>
                    <button id="zoom-reset" class="zoom-reset-btn" title="Reset Zoom">Reset</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Application Script -->
    <script src="assets/js/app.js"></script>
</body>

</html>
